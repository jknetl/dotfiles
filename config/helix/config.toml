theme = "catppuccin_mocha"

[editor]
bufferline = "always"
soft-wrap.enable = true

[keys.normal]
C-g = [
    ":write-all",
    ":new",
    ":insert-output lazygit",
    ":buffer-close!",
    ":redraw",
    ":reload-all"
]

L = "goto_next_buffer"
H = "goto_previous_buffer"

[keys.normal.space]
m = ':sh zellij run --floating --close-on-exit --name markdown -- mo "%{buffer_name}"'
G = ':sh gh browse "%{buffer_name}:%{cursor_line}" -c=%sh{git rev-parse HEAD}'
